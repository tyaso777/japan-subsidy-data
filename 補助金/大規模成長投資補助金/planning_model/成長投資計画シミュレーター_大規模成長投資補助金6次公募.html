<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="大規模成長投資補助金6次公募の成長投資計画・将来PL・評価指標を検証する単独HTMLシミュレーター">
  <title>成長投資計画シミュレーター（Ver. 大規模成長投資補助金 6次公募）</title>
  <style>:root {
  --ink: #17211d;
  --muted: #65706b;
  --paper: #f4f1e9;
  --panel: #fffdf8;
  --line: #dcd8cd;
  --green: #1e6a4b;
  --green-soft: #dcecdf;
  --amber: #d6952a;
  --amber-soft: #f7e8c9;
  --red: #b74335;
  --red-soft: #f5dcd8;
  --navy: #16271f;
  --chart-company: #1e6a4b;
  --chart-project: #d6952a;
  --chart-other: #667b91;
  --display-serif: "Yu Mincho", "YuMincho", Georgia, serif;
}

* { box-sizing: border-box; }

html { background: var(--paper); }

body {
  margin: 0;
  background:
    radial-gradient(circle at 88% 4%, rgba(214, 149, 42, .12), transparent 24rem),
    linear-gradient(180deg, #f8f6f0 0, var(--paper) 32rem);
  color: var(--ink);
  font-family: "Yu Gothic UI", "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif;
  min-height: 100vh;
}

button, input, select { font: inherit; }
button { cursor: pointer; }

main { width: calc(100% - 48px); margin: 0 auto; padding: 34px 0 80px; }

.topbar { display: flex; align-items: flex-end; justify-content: space-between; gap: 32px; padding: 10px 0 28px; }
.topbar h1 { margin: 4px 0 6px; font-family: var(--display-serif); font-size: clamp(28px, 3vw, 40px); letter-spacing: -.03em; font-weight: 500; font-variant-numeric: lining-nums; }
.product-title { display: flex; flex-wrap: wrap; align-items: baseline; gap: 5px 16px; }.product-title small { color: var(--muted); font-family: var(--sans); font-size: clamp(12px, 1.2vw, 16px); font-weight: 700; letter-spacing: .01em; white-space: nowrap; }
.subtitle { margin: 0; color: var(--muted); font-size: 14px; }
.proposal-filebar { display: grid; grid-template-columns: minmax(260px, 1fr) auto; align-items: end; gap: 8px 18px; margin: -12px 0 18px; padding: 13px 15px; border: 1px solid var(--line); border-radius: 12px; background: rgba(255, 253, 248, .75); }
.proposal-filebar > label span { display: block; margin-bottom: 4px; color: var(--muted); font-size: 9px; font-weight: 800; }
.proposal-filebar > label input { width: min(100%, 480px); }
.proposal-file-actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 7px; }
.proposal-import-button, .proposal-action-menu > summary { display: inline-flex; align-items: center; min-height: 34px; border: 1px solid #c9c4b8; background: var(--panel); color: var(--ink); padding: 8px 11px; border-radius: 8px; font-size: 10px; font-weight: 800; cursor: pointer; list-style: none; }
.proposal-action-menu { position: relative; }.proposal-action-menu > summary::-webkit-details-marker { display: none; }.proposal-action-menu > summary span { margin-left: 7px; color: var(--muted); }.proposal-action-menu[open] > summary { border-color: #99b4a4; background: #f2f7f3; color: var(--green); }.proposal-action-menu.sample-menu:not([open]) > summary { color: var(--ink); border-color: #c9c4b8; background: var(--panel); }
.proposal-action-menu-items { position: absolute; top: calc(100% + 6px); right: 0; z-index: 30; display: grid; min-width: 210px; gap: 5px; padding: 9px; border: 1px solid #d4d0c5; border-radius: 10px; background: var(--panel); box-shadow: 0 12px 30px rgba(29, 43, 36, .16); }.proposal-action-menu-items small { padding: 3px 5px 6px; color: var(--muted); font-size: 8px; line-height: 1.4; }.proposal-action-menu-items button { width: 100%; border: 0; border-radius: 7px; background: transparent; padding: 8px 9px; color: var(--ink); font-size: 10px; font-weight: 800; text-align: left; }.proposal-action-menu-items button:hover { background: var(--green-soft); color: var(--green); }.sample-menu .proposal-action-menu-items { min-width: 300px; gap: 0; }.sample-menu-section { display: grid; gap: 4px; padding: 8px 5px; }.sample-menu-section + .sample-menu-section { margin-top: 5px; padding-top: 12px; border-top: 1px solid #e2ded4; }.sample-menu-section > strong { color: var(--green); font-size: 9px; letter-spacing: .04em; }.sample-menu-section > span { margin-bottom: 3px; color: var(--muted); font-size: 8px; line-height: 1.45; }
.proposal-import-button input { display: none; }
.proposal-filebar > small { grid-column: 1 / -1; color: var(--muted); font-size: 9px; }
.data-io-grid { display: grid; grid-template-columns: 1fr; align-items: stretch; gap: 18px; }
.data-io-view .proposal-filebar { grid-template-columns: 1fr; align-content: start; margin: 0; padding: 22px; }
.data-io-view .proposal-filebar:has(.proposal-action-menu[open]) { padding-bottom: 140px; }
.data-io-view .proposal-file-actions { justify-content: flex-start; }
.data-io-view .proposal-action-menu-items { right: auto; left: 0; }
.data-io-panel-heading { grid-column: 1 / -1; }.data-io-panel-heading h3 { margin: 5px 0 0; font-family: var(--serif); font-size: 21px; }.data-io-panel-heading > small { display: block; margin-top: 5px; color: var(--muted); font-size: 9px; }
.sample-library-panel { padding: 22px; border: 1px solid var(--line); border-radius: 12px; background: rgba(255, 253, 248, .75); }
.sample-library-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-top: 16px; }.sample-library-grid section { display: grid; align-content: start; gap: 7px; padding: 15px; border: 1px solid #ddd8cc; border-radius: 10px; background: var(--panel); }.sample-library-grid strong { color: var(--green); font-size: 12px; }.sample-library-grid span { min-height: 32px; color: var(--muted); font-size: 9px; line-height: 1.55; }.sample-library-grid button { width: 100%; border: 1px solid #c9c4b8; border-radius: 8px; background: #fffdf8; padding: 9px 10px; color: var(--ink); font-size: 10px; font-weight: 800; text-align: left; }.sample-library-grid button:hover { border-color: #99b4a4; background: var(--green-soft); color: var(--green); }
.data-io-status { margin: 0; padding: 11px 14px; border-left: 3px solid var(--green); background: var(--green-soft); color: var(--muted); font-size: 10px; }
.load-success-notice { position: fixed; top: 68px; right: 24px; z-index: 100; display: grid; grid-template-columns: auto minmax(0, 1fr) auto; align-items: center; gap: 10px; width: min(390px, calc(100vw - 32px)); padding: 13px 14px; border: 1px solid #9fc4ae; border-radius: 12px; background: #f5fbf6; color: var(--ink); box-shadow: 0 14px 34px rgba(25, 54, 40, .18); animation: load-notice-in .18s ease-out; }.load-success-notice > span:nth-child(2) { min-width: 0; }.load-success-notice strong, .load-success-notice small { display: block; }.load-success-notice strong { color: var(--green); font-size: 12px; }.load-success-notice small { margin-top: 2px; color: var(--muted); font-size: 9px; line-height: 1.45; }.load-success-icon { display: grid; width: 26px; height: 26px; place-items: center; border-radius: 50%; background: var(--green); color: #fff; font-size: 14px; font-weight: 900; }.load-success-notice button { align-self: start; border: 0; background: transparent; color: var(--muted); padding: 0 2px; font-size: 17px; line-height: 1; }.load-success-notice button:hover { color: var(--ink); }@keyframes load-notice-in { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.excel-mapping-panel { padding: 22px; border: 1px solid var(--line); border-radius: 12px; background: rgba(255, 253, 248, .75); }
.excel-mapping-steps { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-top: 16px; }
.excel-mapping-steps > section { display: grid; grid-template-columns: auto 1fr; align-items: center; gap: 10px; min-width: 0; padding: 14px; border: 1px solid #ddd8cc; border-radius: 10px; background: var(--panel); }
.excel-mapping-steps .step-number { display: grid; width: 27px; height: 27px; place-items: center; border-radius: 50%; background: var(--green-soft); color: var(--green); font-size: 10px; font-weight: 900; }
.excel-mapping-steps strong, .excel-mapping-steps small { display: block; }.excel-mapping-steps strong { font-size: 11px; }.excel-mapping-steps small { overflow: hidden; margin-top: 2px; color: var(--muted); font-size: 8px; text-overflow: ellipsis; white-space: nowrap; }
.excel-mapping-steps .proposal-import-button, .excel-mapping-actions { grid-column: 1 / -1; }.excel-mapping-steps .proposal-import-button { justify-content: center; }
.excel-mapping-actions { display: flex; gap: 7px; }.excel-mapping-actions button, .excel-mapping-resources button, .excel-mapping-preview-heading button { border: 1px solid #c9c4b8; border-radius: 8px; background: #fffdf8; padding: 8px 10px; color: var(--ink); font-size: 9px; font-weight: 800; }.excel-mapping-actions button { flex: 1; }.excel-mapping-actions button:hover, .excel-mapping-resources button:hover { border-color: #99b4a4; background: var(--green-soft); color: var(--green); }
.excel-mapping-resources { display: flex; align-items: center; flex-wrap: wrap; gap: 7px; margin-top: 10px; padding: 10px 12px; border-left: 3px solid var(--amber); background: #f2efe7; }.excel-mapping-resources span { margin-right: auto; color: var(--muted); font-size: 9px; }
.excel-mapping-preview { margin-top: 14px; }.excel-mapping-preview-heading { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }.excel-mapping-preview-heading strong { font-size: 12px; }.excel-mapping-preview-heading span { margin-right: auto; color: var(--muted); font-size: 9px; }.excel-mapping-preview-heading button { border-color: #9dbca9; background: var(--green-soft); color: var(--green); }.excel-mapping-preview-heading button:disabled { cursor: not-allowed; opacity: .45; }
.excel-mapping-preview table { min-width: 940px; }.excel-mapping-preview th:first-child { min-width: 310px; }.excel-mapping-preview td:last-child { min-width: 185px; white-space: normal; }.excel-mapping-preview td:last-child small { color: var(--muted); }.excel-mapping-preview .mapping-error th, .excel-mapping-preview .mapping-error td { background: #fff0ed; color: #8f2f25; }.excel-mapping-preview .mapping-empty th, .excel-mapping-preview .mapping-empty td { color: var(--muted); }
.excel-mapping-status { margin: 12px 0 0; padding: 10px 12px; border-left: 3px solid var(--green); background: var(--green-soft); color: var(--muted); font-size: 9px; white-space: pre-line; }
.eyebrow, .card-kicker { margin: 0; color: var(--green); font-size: 11px; font-weight: 800; letter-spacing: .13em; text-transform: uppercase; }
.header-actions { display: flex; align-items: center; gap: 12px; flex: 0 0 auto; }
.mode-switch { display: flex; padding: 4px; background: #e7e3d9; border-radius: 12px; }
.mode-switch button { border: 0; color: var(--muted); background: transparent; padding: 10px 14px; border-radius: 9px; font-size: 13px; font-weight: 700; }
.mode-switch button.active { color: var(--ink); background: var(--panel); box-shadow: 0 2px 10px rgba(25, 35, 30, .08); }
.input-mode-setting { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin: 18px 0 8px; padding-bottom: 18px; border-bottom: 1px solid #e9e5db; }
.input-mode-setting strong, .input-mode-setting small { display: block; }.input-mode-setting small { color: var(--muted); font-size: 9px; margin-top: 4px; }
.future-basis-setting { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin: 18px 0 8px; padding: 14px 0 18px; border-bottom: 1px solid #e9e5db; }.future-basis-setting strong, .future-basis-setting small { display: block; }.future-basis-setting small { color: var(--muted); font-size: 9px; margin-top: 4px; }
.grid-operation-status { margin: -4px 4px 0; color: var(--muted); font-size: 10px; }.spreadsheet-grid tbody td { cursor: cell; }.spreadsheet-grid tbody td.grid-selected { background: #e8f1ff; box-shadow: inset 0 0 0 2px #4b8edb; }.spreadsheet-grid tbody td.grid-selected input { background: #f7fbff; }
.solve-button { border: 0; background: var(--amber); color: #211b10; padding: 14px 19px; border-radius: 11px; font-weight: 800; box-shadow: 0 7px 20px rgba(166, 111, 20, .2); }
.solve-button:hover { filter: brightness(.96); transform: translateY(-1px); }
.reset-button { border: 1px solid #c9c4b8; background: var(--panel); color: var(--ink); padding: 13px 15px; border-radius: 11px; font-size: 11px; font-weight: 800; }
.default-button { border: 1px solid #b9cfc1; background: var(--green-soft); color: var(--green); padding: 11px 14px; border-radius: 10px; font-size: 11px; font-weight: 800; }
.default-button:hover { filter: brightness(.97); }
.default-note { margin: 12px 0 0; padding: 11px 13px; border-left: 3px solid var(--green); background: #eef6f0; color: #3f5e4d; font-size: 10px; line-height: 1.6; }
.benchmark-note { display: flex; flex-wrap: wrap; align-items: center; gap: 7px 12px; margin-top: 12px; padding: 11px 13px; background: #f2efe7; border-left: 3px solid var(--amber); font-size: 9px; }.benchmark-note strong { margin-right: 4px; }.benchmark-note span { color: #525e58; }.benchmark-note a { margin-left: auto; color: var(--green); font-weight: 800; }
.workflow-actions { display: flex; align-items: center; justify-content: space-between; gap: 24px; padding: 16px 18px; border: 1px solid #d6d1c5; border-radius: 14px; background: rgba(255, 253, 248, .72); color: var(--muted); font-size: 11px; }

.tabs { position: sticky; top: 0; z-index: 25; display: flex; gap: 2px; border-bottom: 1px solid var(--line); margin-bottom: 24px; overflow-x: auto; background: rgba(248, 246, 240, .96); backdrop-filter: blur(10px); }
.tabs button { background: transparent; border: 0; color: var(--muted); padding: 13px 18px; font-size: 13px; font-weight: 700; white-space: nowrap; border-bottom: 3px solid transparent; }
.tabs button.active { color: var(--green); border-color: var(--green); }
.tab-group-separator { align-self: center; flex: 0 0 auto; margin: 0 8px; color: #b8b3a8; font-size: 16px; line-height: 1; }

.page-grid { display: grid; gap: 18px; }
.summary-grid { grid-template-columns: 1.4fr repeat(3, 1fr); align-items: stretch; }
.hero-card, .stat-card, .panel { border-radius: 16px; border: 1px solid var(--line); box-shadow: 0 12px 30px rgba(30, 40, 35, .035); }
.dark-card { background: var(--navy); color: white; border-color: var(--navy); }
.hero-card { display: flex; align-items: center; justify-content: space-between; padding: 27px 28px; }
.hero-card h2 { margin: 8px 0 5px; font-family: var(--display-serif); font-size: 26px; font-weight: 500; font-variant-numeric: lining-nums; }
.hero-card p:not(.card-kicker) { color: #b9c4bd; font-size: 13px; margin: 0; }
.score-ring { width: 88px; height: 88px; border-radius: 50%; display: grid; place-content: center; text-align: center; border: 8px solid #325743; outline: 1px solid #5d7c6a; }
.score-ring strong { font-size: 25px; line-height: 1; }.score-ring span { color: #b5c7bd; font-size: 12px; }.score-ring small { display: block; color: #95a79e; font-size: 9px; margin-top: 2px; }
.stat-card { background: var(--panel); padding: 23px; display: flex; flex-direction: column; justify-content: center; }
.stat-card span { color: var(--muted); font-size: 12px; }.stat-card strong { font-family: var(--display-serif); font-size: 25px; font-weight: 500; font-variant-numeric: lining-nums; margin: 10px 0 5px; }.stat-card small { color: #8b938f; font-size: 11px; }
.panel { background: var(--panel); padding: 24px; }
.metric-overview { grid-column: span 3; }.validation-panel { grid-column: span 1; }
.panel-heading { display: flex; align-items: center; justify-content: space-between; gap: 18px; margin-bottom: 18px; }
.panel-heading h2, .panel > h2 { margin: 4px 0 0; font-family: var(--display-serif); font-size: 22px; font-weight: 500; font-variant-numeric: lining-nums; }
.text-button { color: var(--green); border: 0; background: transparent; font-size: 12px; font-weight: 800; }
.metric-list { display: grid; grid-template-columns: 1fr 1fr; column-gap: 26px; }
.metric-row { display: grid; grid-template-columns: 10px minmax(190px, 1fr) 105px 108px; align-items: center; gap: 10px; min-height: 58px; border-top: 1px solid #ece8df; }
.metric-row:nth-child(-n+2) { border-top: 0; }
.metric-row strong { display: block; font-size: 12px; }.metric-row small { display: block; color: #909792; font-size: 9px; margin-top: 3px; }
.metric-value { font-size: 13px; font-weight: 800; text-align: right; }.metric-target { color: var(--muted); font-size: 10px; text-align: right; }
.before-metric { display: block; color: #8c938f; font-size: 9px; font-weight: 500; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--amber); }.status-dot.ok { background: var(--green); }.status-dot.bad { background: var(--red); }
.solve-note { background: #f2efe7; border-left: 3px solid var(--amber); padding: 11px 12px; font-size: 11px; line-height: 1.6; }
.validation-list { display: grid; gap: 8px; }
.validation { padding: 10px 11px; border-radius: 9px; background: #f4f2ec; border-left: 3px solid #a8afa9; }
.validation.warning { background: var(--amber-soft); border-color: var(--amber); }.validation.error { background: var(--red-soft); border-color: var(--red); }.validation.info { background: var(--green-soft); border-color: var(--green); }
.validation strong { font-size: 11px; }.validation p { margin: 3px 0 0; color: #59635e; font-size: 10px; line-height: 1.5; }
.footnote { color: var(--muted); font-size: 10px; line-height: 1.6; margin: 14px 0 0; }

.content-stack { display: grid; gap: 18px; }
.section-intro { display: flex; justify-content: space-between; align-items: flex-end; gap: 30px; padding: 9px 4px 13px; }
.section-intro h2 { margin: 5px 0 0; font-family: var(--display-serif); font-size: 32px; font-weight: 500; font-variant-numeric: lining-nums; }.section-intro > p { color: var(--muted); max-width: 550px; font-size: 12px; line-height: 1.7; margin: 0; }
.two-column { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.input-list { display: grid; gap: 1px; }
.input-list label, .driver-grid label { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 9px 10px; border-bottom: 1px solid #ece8df; }
.input-list label > span, .driver-grid label > span { font-size: 12px; font-weight: 700; }.input-list small, .driver-grid small { display: block; color: var(--muted); font-size: 9px; margin-top: 2px; }
input, select { border: 1px solid #d7d2c7; background: #fffefa; color: var(--ink); border-radius: 7px; padding: 8px 9px; }
.input-list input, .driver-grid input { width: 120px; text-align: right; font-variant-numeric: tabular-nums; }
.driver-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0 24px; }.driver-grid label.movable { background: linear-gradient(90deg, transparent, rgba(247, 232, 201, .38)); }.driver-grid label.fixed { background: linear-gradient(90deg, transparent, rgba(220, 236, 223, .4)); }
.driver-values { display: flex; width: 100%; align-items: center; justify-content: flex-end; gap: 7px; }.driver-values .adjusted-value { color: var(--green); font-weight: 800; white-space: nowrap; }
.application-category-control { display: grid; width: min(100%, 560px); gap: 8px; }
.application-category-copy { display: flex; align-items: baseline; gap: 12px; white-space: nowrap; }
.application-category-copy strong { font-size: 12px; }
.application-category-copy small { color: var(--muted); font-size: 9px; }
.application-category-control select { width: 100%; min-width: 0; }
.statutory-summary { margin-top: 16px; }
.statutory-condition { min-width: 165px; max-width: 230px; color: #315b46; background: #f1f7f3; text-align: center; white-space: normal; line-height: 1.45; }
.statutory-condition strong { display: block; margin-inline: auto; font-size: 9px; }
.statutory-failure { color: var(--red); background: var(--red-soft); border-left-color: var(--red); }
.driver-validation-error th, .driver-validation-error td { background-color: #fff8f6; }
.driver-validation-error input[aria-invalid="true"] { border-color: var(--red); background: #fff7f5; box-shadow: inset 0 0 0 1px rgba(183, 67, 53, .18); }
.field-error { display: block; margin-top: 5px; color: var(--red); font-size: 8px; font-weight: 800; line-height: 1.4; white-space: normal; }
.pill { background: var(--amber-soft); color: #7b5212; border-radius: 999px; padding: 6px 10px; font-size: 9px; font-weight: 800; }.pill.green { background: var(--green-soft); color: var(--green); }
.pill.blue-pill { background: #e8f1ff; color: #245ea8; }.forecast-override { border: 2px solid #4b8edb; background: #f7fbff; }.forecast-override::placeholder { color: #6b86a5; opacity: 1; }.forecast-override.is-fixed { border-color: #245ea8; background: #dceaff; color: #173f72; font-weight: 800; }
.calculated-row th:first-child, .calculated-cell { background: #f6f8f4; }
.calculated-cell strong { display: block; color: #234d3c; }
.calculated-cell small { display: block; margin-top: 3px; color: #6e7d75; font-size: 10px; }
.official-related-start th, .official-related-start td { border-top: 3px solid #466958; }
.wide-table:not(.balance-sheet-table) thead th { height: 56px; }
.official-section-heading th, .official-section-heading td { position: sticky; top: 56px; z-index: 4; padding: 8px 12px; border-top: 1px solid #9fb6aa; border-bottom: 1px solid #bdcec5; background: #e3ede7 !important; color: #294a3b; text-align: left; }
.official-section-heading th { left: 0; z-index: 6 !important; }
.official-section-heading td { padding: 0; }
.official-section-heading th strong, .official-section-heading th small { display: inline; white-space: nowrap; }
.official-section-heading th small { margin-left: 10px; color: #62786d; }
.historical-heading { background: #ebe8df !important; color: #67716c !important; }.historical-reference { background: #f4f2eb; color: #68716d; }.historical-reference strong { font-weight: 650; }

.formula-list { display: grid; grid-template-columns: 1fr 1fr; gap: 0 24px; }.formula-list > div { display: grid; grid-template-columns: 34px 1fr; gap: 10px; padding: 15px 0; border-bottom: 1px solid #e8e4da; }.formula-list > div > span { color: var(--amber); font-family: var(--display-serif); font-variant-numeric: lining-nums; }.formula-list strong, .formula-list code, .formula-list small { display: block; }.formula-list strong { font-size: 12px; }.formula-list code { margin: 6px 0; color: #42504a; font-size: 10px; white-space: normal; }.formula-list small { color: var(--muted); font-size: 9px; }
.source-note { padding: 18px 20px; background: #e7eadf; border-radius: 13px; }.source-note strong { font-size: 12px; }.source-note p { color: #4f5a54; font-size: 10px; line-height: 1.6; }.source-note a { color: var(--green); font-size: 10px; font-weight: 800; }

@media (max-width: 1100px) {
  .summary-grid { grid-template-columns: 1fr 1fr; }.hero-card { grid-column: span 2; }.metric-overview, .validation-panel { grid-column: span 2; }.driver-grid { grid-template-columns: 1fr 1fr; }.logic-flow { grid-template-columns: 1fr 1fr; }.logic-flow i { display: none; }
}

@media (max-width: 720px) {
  main { width: min(100% - 24px, 1460px); padding-top: 18px; }.topbar, .section-intro, .diagnostic-heading, .diagnostic-chart-heading, .target-action-bar, .workflow-actions { align-items: stretch; flex-direction: column; }.proposal-filebar, .data-io-grid, .sample-library-grid, .excel-mapping-steps { grid-template-columns: 1fr; }.proposal-file-actions { justify-content: flex-start; }.proposal-action-menu-items { right: auto; left: 0; }.proposal-filebar > small { grid-column: auto; }.header-actions, .target-action-buttons { align-items: stretch; flex-direction: column; }.input-mode-setting, .future-basis-setting { align-items: stretch; flex-direction: column; }.mode-switch button { flex: 1; }.summary-grid, .two-column, .driver-grid, .metric-list, .formula-list, .logic-flow, .diagnostic-chart-grid, .metric-group-controls { grid-template-columns: 1fr; }.hero-card, .metric-overview, .validation-panel { grid-column: span 1; }.hero-card { align-items: flex-start; gap: 20px; }.metric-row { grid-template-columns: 10px 1fr auto; }.metric-target { display: none; }.section-intro h2 { font-size: 26px; }.trend-chart-card { padding: 14px 10px 10px; }
  .load-success-notice { top: 58px; right: 12px; }
}

@media (max-width: 560px) {
  .application-category-copy { display: grid; gap: 3px; white-space: normal; }
}
