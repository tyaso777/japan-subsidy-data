<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="大規模成長投資補助金のPL・15指標・目標競合を検証する単一HTMLモデル">
  <title>成長投資計画 数値設計ラボ</title>
  <style>:root {
  --ink: #17211d;
  --muted: #65706b;
  --paper: #f4f1e9;
  --panel: #fffdf8;
  --line: #dcd8cd;
  --green: #1e6a4b;
  --green-soft: #dcecdf;
  --amber: #d6952a;
  --amber-soft: #f7e8c9;
  --red: #b74335;
  --red-soft: #f5dcd8;
  --navy: #16271f;
  --chart-company: #1e6a4b;
  --chart-project: #d6952a;
  --chart-other: #667b91;
}

* { box-sizing: border-box; }

html { background: var(--paper); }

body {
  margin: 0;
  background:
    radial-gradient(circle at 88% 4%, rgba(214, 149, 42, .12), transparent 24rem),
    linear-gradient(180deg, #f8f6f0 0, var(--paper) 32rem);
  color: var(--ink);
  font-family: "Yu Gothic UI", "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif;
  min-height: 100vh;
}

button, input, select { font: inherit; }
button { cursor: pointer; }

main { width: calc(100% - 48px); margin: 0 auto; padding: 34px 0 80px; }

.topbar { display: flex; align-items: flex-end; justify-content: space-between; gap: 32px; padding: 10px 0 28px; }
.topbar h1 { margin: 4px 0 6px; font-family: Georgia, "Yu Mincho", serif; font-size: clamp(30px, 4vw, 52px); letter-spacing: -.03em; font-weight: 500; }
.subtitle { margin: 0; color: var(--muted); font-size: 14px; }
.proposal-filebar { display: grid; grid-template-columns: minmax(260px, 1fr) auto; align-items: end; gap: 8px 18px; margin: -12px 0 18px; padding: 13px 15px; border: 1px solid var(--line); border-radius: 12px; background: rgba(255, 253, 248, .75); }
.proposal-filebar > label span { display: block; margin-bottom: 4px; color: var(--muted); font-size: 9px; font-weight: 800; }
.proposal-filebar > label input { width: min(100%, 480px); }
.proposal-file-actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 7px; }
.proposal-file-actions button, .proposal-import-button { display: inline-flex; align-items: center; border: 1px solid #c9c4b8; background: var(--panel); color: var(--ink); padding: 8px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; cursor: pointer; }
.proposal-file-actions .sample-load-button { color: var(--green); border-color: #b9cfc1; background: var(--green-soft); }
.proposal-import-button input { display: none; }
.proposal-filebar > small { grid-column: 1 / -1; color: var(--muted); font-size: 9px; }
.eyebrow, .card-kicker { margin: 0; color: var(--green); font-size: 11px; font-weight: 800; letter-spacing: .13em; text-transform: uppercase; }
.header-actions { display: flex; align-items: center; gap: 12px; flex: 0 0 auto; }
.mode-switch { display: flex; padding: 4px; background: #e7e3d9; border-radius: 12px; }
.mode-switch button { border: 0; color: var(--muted); background: transparent; padding: 10px 14px; border-radius: 9px; font-size: 13px; font-weight: 700; }
.mode-switch button.active { color: var(--ink); background: var(--panel); box-shadow: 0 2px 10px rgba(25, 35, 30, .08); }
.input-mode-setting { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin: 18px 0 8px; padding-bottom: 18px; border-bottom: 1px solid #e9e5db; }
.input-mode-setting strong, .input-mode-setting small { display: block; }.input-mode-setting small { color: var(--muted); font-size: 9px; margin-top: 4px; }
.future-basis-setting { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin: 18px 0 8px; padding: 14px 0 18px; border-bottom: 1px solid #e9e5db; }.future-basis-setting strong, .future-basis-setting small { display: block; }.future-basis-setting small { color: var(--muted); font-size: 9px; margin-top: 4px; }
.grid-operation-status { margin: -4px 4px 0; color: var(--muted); font-size: 10px; }.spreadsheet-grid tbody td { cursor: cell; }.spreadsheet-grid tbody td.grid-selected { background: #e8f1ff; box-shadow: inset 0 0 0 2px #4b8edb; }.spreadsheet-grid tbody td.grid-selected input { background: #f7fbff; }
.solve-button { border: 0; background: var(--amber); color: #211b10; padding: 14px 19px; border-radius: 11px; font-weight: 800; box-shadow: 0 7px 20px rgba(166, 111, 20, .2); }
.solve-button:hover { filter: brightness(.96); transform: translateY(-1px); }
.reset-button { border: 1px solid #c9c4b8; background: var(--panel); color: var(--ink); padding: 13px 15px; border-radius: 11px; font-size: 11px; font-weight: 800; }
.default-button { border: 1px solid #b9cfc1; background: var(--green-soft); color: var(--green); padding: 11px 14px; border-radius: 10px; font-size: 11px; font-weight: 800; }
.default-button:hover { filter: brightness(.97); }
.default-note { margin: 12px 0 0; padding: 11px 13px; border-left: 3px solid var(--green); background: #eef6f0; color: #3f5e4d; font-size: 10px; line-height: 1.6; }
.benchmark-note { display: flex; flex-wrap: wrap; align-items: center; gap: 7px 12px; margin-top: 12px; padding: 11px 13px; background: #f2efe7; border-left: 3px solid var(--amber); font-size: 9px; }.benchmark-note strong { margin-right: 4px; }.benchmark-note span { color: #525e58; }.benchmark-note a { margin-left: auto; color: var(--green); font-weight: 800; }
.workflow-actions { display: flex; align-items: center; justify-content: space-between; gap: 24px; padding: 16px 18px; border: 1px solid #d6d1c5; border-radius: 14px; background: rgba(255, 253, 248, .72); color: var(--muted); font-size: 11px; }

.tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--line); margin-bottom: 24px; overflow-x: auto; }
.tabs button { background: transparent; border: 0; color: var(--muted); padding: 13px 18px; font-size: 13px; font-weight: 700; white-space: nowrap; border-bottom: 3px solid transparent; }
.tabs button.active { color: var(--green); border-color: var(--green); }

.page-grid { display: grid; gap: 18px; }
.summary-grid { grid-template-columns: 1.4fr repeat(3, 1fr); align-items: stretch; }
.hero-card, .stat-card, .panel { border-radius: 16px; border: 1px solid var(--line); box-shadow: 0 12px 30px rgba(30, 40, 35, .035); }
.dark-card { background: var(--navy); color: white; border-color: var(--navy); }
.hero-card { display: flex; align-items: center; justify-content: space-between; padding: 27px 28px; }
.hero-card h2 { margin: 8px 0 5px; font-family: Georgia, "Yu Mincho", serif; font-size: 26px; font-weight: 500; }
.hero-card p:not(.card-kicker) { color: #b9c4bd; font-size: 13px; margin: 0; }
.score-ring { width: 88px; height: 88px; border-radius: 50%; display: grid; place-content: center; text-align: center; border: 8px solid #325743; outline: 1px solid #5d7c6a; }
.score-ring strong { font-size: 25px; line-height: 1; }.score-ring span { color: #b5c7bd; font-size: 12px; }.score-ring small { display: block; color: #95a79e; font-size: 9px; margin-top: 2px; }
.stat-card { background: var(--panel); padding: 23px; display: flex; flex-direction: column; justify-content: center; }
.stat-card span { color: var(--muted); font-size: 12px; }.stat-card strong { font-family: Georgia, serif; font-size: 25px; font-weight: 500; margin: 10px 0 5px; }.stat-card small { color: #8b938f; font-size: 11px; }
.panel { background: var(--panel); padding: 24px; }
.metric-overview { grid-column: span 3; }.validation-panel { grid-column: span 1; }
.panel-heading { display: flex; align-items: center; justify-content: space-between; gap: 18px; margin-bottom: 18px; }
.panel-heading h2, .panel > h2 { margin: 4px 0 0; font-family: Georgia, "Yu Mincho", serif; font-size: 22px; font-weight: 500; }
.text-button { color: var(--green); border: 0; background: transparent; font-size: 12px; font-weight: 800; }
.metric-list { display: grid; grid-template-columns: 1fr 1fr; column-gap: 26px; }
.metric-row { display: grid; grid-template-columns: 10px minmax(190px, 1fr) 105px 108px; align-items: center; gap: 10px; min-height: 58px; border-top: 1px solid #ece8df; }
.metric-row:nth-child(-n+2) { border-top: 0; }
.metric-row strong { display: block; font-size: 12px; }.metric-row small { display: block; color: #909792; font-size: 9px; margin-top: 3px; }
.metric-value { font-size: 13px; font-weight: 800; text-align: right; }.metric-target { color: var(--muted); font-size: 10px; text-align: right; }
.before-metric { display: block; color: #8c938f; font-size: 9px; font-weight: 500; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--amber); }.status-dot.ok { background: var(--green); }.status-dot.bad { background: var(--red); }
.solve-note { background: #f2efe7; border-left: 3px solid var(--amber); padding: 11px 12px; font-size: 11px; line-height: 1.6; }
.validation-list { display: grid; gap: 8px; }
.validation { padding: 10px 11px; border-radius: 9px; background: #f4f2ec; border-left: 3px solid #a8afa9; }
.validation.warning { background: var(--amber-soft); border-color: var(--amber); }.validation.error { background: var(--red-soft); border-color: var(--red); }.validation.info { background: var(--green-soft); border-color: var(--green); }
.validation strong { font-size: 11px; }.validation p { margin: 3px 0 0; color: #59635e; font-size: 10px; line-height: 1.5; }
.footnote { color: var(--muted); font-size: 10px; line-height: 1.6; margin: 14px 0 0; }

.content-stack { display: grid; gap: 18px; }
.section-intro { display: flex; justify-content: space-between; align-items: flex-end; gap: 30px; padding: 9px 4px 13px; }
.section-intro h2 { margin: 5px 0 0; font-family: Georgia, "Yu Mincho", serif; font-size: 32px; font-weight: 500; }.section-intro > p { color: var(--muted); max-width: 550px; font-size: 12px; line-height: 1.7; margin: 0; }
.two-column { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.input-list { display: grid; gap: 1px; }
.input-list label, .driver-grid label { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 9px 10px; border-bottom: 1px solid #ece8df; }
.input-list label > span, .driver-grid label > span { font-size: 12px; font-weight: 700; }.input-list small, .driver-grid small { display: block; color: var(--muted); font-size: 9px; margin-top: 2px; }
input, select { border: 1px solid #d7d2c7; background: #fffefa; color: var(--ink); border-radius: 7px; padding: 8px 9px; }
.input-list input, .driver-grid input { width: 120px; text-align: right; font-variant-numeric: tabular-nums; }
.driver-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0 24px; }.driver-grid label.movable { background: linear-gradient(90deg, transparent, rgba(247, 232, 201, .38)); }.driver-grid label.fixed { background: linear-gradient(90deg, transparent, rgba(220, 236, 223, .4)); }
.driver-values { display: flex; width: 100%; align-items: center; justify-content: flex-end; gap: 7px; }.driver-values .adjusted-value { color: var(--green); font-weight: 800; white-space: nowrap; }
.pill { background: var(--amber-soft); color: #7b5212; border-radius: 999px; padding: 6px 10px; font-size: 9px; font-weight: 800; }.pill.green { background: var(--green-soft); color: var(--green); }
.pill.blue-pill { background: #e8f1ff; color: #245ea8; }.forecast-override { border: 2px solid #4b8edb; background: #f7fbff; }.forecast-override::placeholder { color: #6b86a5; opacity: 1; }.forecast-override.is-fixed { border-color: #245ea8; background: #dceaff; color: #173f72; font-weight: 800; }
.historical-heading { background: #ebe8df !important; color: #67716c !important; }.historical-reference { background: #f4f2eb; color: #68716d; }.historical-reference strong { font-weight: 650; }
.future-empty { display: inline-block; min-width: 88px; padding: 7px 6px; text-align: center; color: var(--muted); }
.comparison-banner { display: flex; align-items: center; gap: 12px; background: var(--green-soft); border: 1px solid #bdd6c4; border-radius: 12px; padding: 13px 16px; color: #315340; font-size: 11px; }.comparison-banner strong { color: var(--green); }.comparison-banner .text-button { margin-left: auto; }

.table-panel { overflow: hidden; min-width: 0; }.wide-table, .targets-table-wrap { display: block; width: 100%; max-width: 100%; min-width: 0; box-sizing: border-box; max-height: min(76vh, 860px); overflow: auto; margin-top: 15px; position: relative; isolation: isolate; }
table { width: 100%; border-collapse: collapse; font-size: 11px; }
th, td { padding: 10px 12px; border-bottom: 1px solid #e9e5db; text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; }
.before-cell { display: block; color: #8f9692; font-size: 8px; font-weight: 500; }.after-cell { color: var(--green); font-size: 11px; }
th:first-child, td:first-child { text-align: left; position: sticky; left: 0; background: var(--panel); z-index: 1; }
thead th { color: var(--muted); font-size: 9px; text-transform: uppercase; letter-spacing: .06em; background: #f3f0e8; }
thead th:first-child { background: #f3f0e8; }.emphasis th, .emphasis td { font-weight: 800; background: #f7f5ee; }.company-table { border-top: 4px solid var(--green); }
.wide-table:not(.balance-sheet-table) thead th, .targets-table-wrap thead th { position: sticky; top: 0; z-index: 3; background: #f3f0e8; }
.wide-table:not(.balance-sheet-table) thead th:first-child, .targets-table-wrap thead th:first-child { left: 0; z-index: 5; }
.wide-table:not(.balance-sheet-table) table, .targets-table-wrap table { border-collapse: separate; border-spacing: 0; }
.wide-table:not(.balance-sheet-table) table { width: 100%; min-width: max-content; }
.wide-table:not(.balance-sheet-table) th:first-child { width: 280px; min-width: 280px; }
.wide-table:not(.balance-sheet-table) th:not(:first-child), .wide-table:not(.balance-sheet-table) td:not(:first-child) { width: 132px; min-width: 132px; }
.targets-table-wrap table { min-width: 1560px; }
.balance-sheet-table { position: relative; isolation: isolate; max-height: min(76vh, 860px); overflow: auto; }
.balance-sheet-table table { border-collapse: separate; border-spacing: 0; min-width: max-content; }
.balance-sheet-table thead th { position: sticky; top: 0; z-index: 4; background: #f3f0e8; }
.balance-sheet-table th:first-child { width: 270px; min-width: 270px; max-width: 270px; position: sticky !important; left: 0 !important; z-index: 5; background: var(--panel); }
.balance-sheet-table thead th:first-child { top: 0; z-index: 7; background: #f3f0e8; }
.balance-sheet-table .emphasis th:first-child { background: #f7f5ee; }
.actuals-three-year-table { width: min(100%, 860px); max-width: 860px; margin: 15px auto 0; }
.history-actuals-view { width: min(100%, 1040px); margin-inline: auto; }
.actuals-three-year-table table { width: 100% !important; min-width: 730px !important; table-layout: fixed; }
.actuals-three-year-table table, .actuals-three-year-table th, .actuals-three-year-table td { box-sizing: border-box; }
.actuals-three-year-table th:first-child { width: 310px !important; min-width: 310px !important; max-width: 310px !important; }
.actuals-three-year-table th:not(:first-child), .actuals-three-year-table td:not(:first-child) { width: 140px !important; min-width: 140px !important; }
@media (min-width: 960px) { .actuals-three-year-table { overflow-x: hidden; overflow-y: auto; } }
.future-capex-table input { width: 88px; padding: 6px; text-align: right; }
.content-stack, .panel, .manual-sections, .manual-sections > div { min-width: 0; }.manual-sections { display: grid; gap: 30px; }.manual-sections h3 { font-family: Georgia, "Yu Mincho", serif; font-weight: 500; font-size: 20px; }.manual-sections input { width: 88px; text-align: right; padding: 6px; }.wide-table th small { display: block; color: var(--muted); font-size: 8px; margin-top: 3px; }
.targets-table { min-width: 1560px; }.targets-table td:nth-child(2) { text-align: left; white-space: normal; min-width: 260px; }.targets-table td:nth-child(2) strong, .targets-table td:nth-child(2) small, .targets-table thead th small, .historical-metric small { display: block; }.targets-table td:nth-child(2) small, .targets-table thead th small, .historical-metric small { color: var(--muted); margin-top: 3px; font-size: 9px; }.targets-table input { width: 88px; text-align: right; padding: 6px; }.targets-table select { padding: 6px; }.numeric { font-weight: 800; }.historical-metric { color: #56635d; background: #f7f5ee; font-weight: 700; }
.driver-target-table table { min-width: 1250px !important; }.driver-target-table input { width: 88px; padding: 6px; text-align: right; }.driver-target-table th:first-child { width: 290px !important; min-width: 290px !important; }.driver-target-table .driver-history small { display: block; margin-top: 3px; color: var(--muted); font-size: 8px; }.driver-target-table tr.driver-adjustable th, .driver-target-table tr.driver-adjustable td { background: rgba(247, 232, 201, .25); }.driver-target-table tr.driver-fixed th, .driver-target-table tr.driver-fixed td { background: rgba(220, 236, 223, .3); }.driver-policy { display: inline-block; padding: 5px 8px; border-radius: 999px; background: var(--green-soft); color: var(--green); font-size: 9px; font-weight: 800; }.driver-policy.out-of-range { background: var(--red-soft); color: var(--red); }
.driver-target-table .driver-reference-heading { color: #52645d; background: #ebe8df; }.driver-target-table .driver-reference-heading small { color: #74807a; text-transform: none; letter-spacing: 0; line-height: 1.45; }
.driver-target-table .driver-group-heading th { position: static; width: auto !important; min-width: 0 !important; padding: 11px 14px; background: #243a30; color: white; text-align: left; letter-spacing: .03em; }.driver-target-table .driver-group-heading strong { font-size: 11px; }.driver-target-table .driver-group-heading small { display: inline; margin-left: 12px; color: #bfd0c7; font-size: 9px; }
.no-range { color: #929995; font-weight: 700; }
.target-action-bar { display: flex; align-items: center; justify-content: space-between; gap: 24px; margin-top: 18px; padding-top: 18px; border-top: 1px solid #e9e5db; }.target-action-bar strong, .target-action-bar small { display: block; }.target-action-bar small { margin-top: 4px; color: var(--muted); font-size: 10px; }.target-action-bar .solve-note { margin: 10px 0 0; }.target-action-buttons { display: flex; align-items: center; gap: 10px; flex: 0 0 auto; }
.behavior-change-panel { grid-column: 1 / -1; }.behavior-change-panel .formula-cell { min-width: 360px; white-space: normal; text-align: left; color: var(--muted); }
.diagnostic-charts { grid-column: 1 / -1; display: grid; gap: 14px; min-width: 0; }
.diagnostic-chart-heading { display: flex; align-items: end; justify-content: space-between; gap: 24px; padding: 4px; }.diagnostic-chart-heading h2 { margin: 5px 0 0; font-family: Georgia, "Yu Mincho", serif; font-size: 24px; font-weight: 500; }.diagnostic-chart-heading > p, .diagnostic-chart-heading > div + p { max-width: 480px; margin: 0; color: var(--muted); font-size: 10px; line-height: 1.6; }
.diagnostic-chart-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }.trend-chart-card { min-width: 0; padding: 18px 18px 14px; border: 1px solid var(--line); border-radius: 16px; background: var(--panel); box-shadow: 0 12px 30px rgba(30, 40, 35, .035); }.trend-chart-title { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }.trend-chart-title h3 { margin: 0; font-family: Georgia, "Yu Mincho", serif; font-size: 18px; font-weight: 500; }.trend-chart-title p { margin: 4px 0 0; color: var(--muted); font-size: 9px; }.trend-chart-title > span { flex: 0 0 auto; padding: 4px 7px; border-radius: 999px; background: #f1eee6; color: var(--muted); font-size: 8px; font-weight: 800; }
.trend-chart-svg { display: block; width: 100%; height: auto; margin-top: 8px; overflow: visible; }.trend-chart-future-area { fill: rgba(30, 106, 75, .045); }.trend-chart-gridline { stroke: #e5e0d5; stroke-width: 1; }.trend-chart-base-line { stroke: #b99a66; stroke-width: 1; stroke-dasharray: 3 4; }.trend-chart-axis-label, .trend-chart-year, .trend-chart-boundary-label { fill: var(--muted); font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif; font-size: 9px; }.trend-chart-boundary-label { fill: #7c6a4d; font-size: 8px; font-weight: 800; }.trend-chart-line { fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-width: 2.5; vector-effect: non-scaling-stroke; }.trend-chart-line.forecast { stroke-dasharray: 7 5; }.trend-chart-point { stroke-width: 2; vector-effect: non-scaling-stroke; }
.trend-chart-legend { display: flex; flex-wrap: wrap; gap: 7px 16px; padding: 3px 4px 0; }.trend-chart-legend span { display: inline-flex; align-items: center; gap: 5px; color: var(--muted); font-size: 9px; }.trend-chart-legend i { width: 8px; height: 8px; border-radius: 50%; }.trend-chart-legend strong { margin-left: 2px; color: var(--ink); font-variant-numeric: tabular-nums; }.trend-chart-note { margin: 0 4px; color: var(--muted); font-size: 9px; line-height: 1.6; }.trend-chart-note span { display: inline-block; width: 18px; margin: 0 5px 2px 10px; border-top: 2px solid var(--green); }.trend-chart-note span:first-child { margin-left: 0; }.trend-chart-note .dash-sample { border-top-style: dashed; }
.financial-diagnostics { grid-column: 1 / -1; display: grid; gap: 18px; min-width: 0; }.diagnostic-heading { display: flex; align-items: end; justify-content: space-between; gap: 24px; padding: 4px; }.diagnostic-heading h2, .diagnostic-panel h3 { margin: 5px 0 0; font-family: Georgia, "Yu Mincho", serif; font-weight: 500; }.diagnostic-heading p:last-child { max-width: 460px; margin: 0; color: var(--muted); font-size: 10px; }.diagnostic-panel h3 { font-size: 21px; }.diagnostic-table th:nth-child(2), .diagnostic-table td:nth-child(2) { width: 260px !important; min-width: 260px !important; }.diagnostic-table th:nth-child(3), .diagnostic-table td:nth-child(3) { width: 300px !important; min-width: 300px !important; }.diagnostic-table .diagnostic-copy { white-space: normal; text-align: left; color: var(--muted); line-height: 1.55; }.diagnostic-values { display: grid; gap: 3px; }.diagnostic-values span { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }.diagnostic-values small { color: var(--muted); font-size: 8px; }.diagnostic-values strong { font-size: 10px; }
.result-badge { display: inline-block; border-radius: 999px; padding: 5px 8px; color: #7d561b; background: var(--amber-soft); font-size: 9px; font-weight: 800; }.result-badge.ok { color: var(--green); background: var(--green-soft); }.result-badge.bad { color: var(--red); background: var(--red-soft); }

.logic-flow { display: grid; grid-template-columns: 1fr auto 1fr auto 1fr auto 1fr; align-items: center; gap: 10px; }
.logic-flow > div { min-height: 145px; background: var(--navy); color: white; border-radius: 14px; padding: 19px; }.logic-flow span { color: var(--amber); font-family: Georgia, serif; }.logic-flow strong { display: block; margin: 16px 0 8px; font-size: 13px; }.logic-flow p { margin: 0; color: #afbeb6; font-size: 10px; line-height: 1.6; }.logic-flow i { color: var(--amber); font-style: normal; font-size: 20px; }
.formula-panel code { display: block; background: #18251f; color: #d7e6dd; padding: 14px 16px; border-radius: 9px; margin-top: 12px; font-family: "Cascadia Mono", Consolas, monospace; font-size: 11px; white-space: normal; }.formula-panel p { color: var(--muted); font-size: 11px; line-height: 1.7; }
.formula-list { display: grid; grid-template-columns: 1fr 1fr; gap: 0 24px; }.formula-list > div { display: grid; grid-template-columns: 34px 1fr; gap: 10px; padding: 15px 0; border-bottom: 1px solid #e8e4da; }.formula-list > div > span { color: var(--amber); font-family: Georgia, serif; }.formula-list strong, .formula-list code, .formula-list small { display: block; }.formula-list strong { font-size: 12px; }.formula-list code { margin: 6px 0; color: #42504a; font-size: 10px; white-space: normal; }.formula-list small { color: var(--muted); font-size: 9px; }
.source-note { padding: 18px 20px; background: #e7eadf; border-radius: 13px; }.source-note strong { font-size: 12px; }.source-note p { color: #4f5a54; font-size: 10px; line-height: 1.6; }.source-note a { color: var(--green); font-size: 10px; font-weight: 800; }

@media (max-width: 1100px) {
  .summary-grid { grid-template-columns: 1fr 1fr; }.hero-card { grid-column: span 2; }.metric-overview, .validation-panel { grid-column: span 2; }.driver-grid { grid-template-columns: 1fr 1fr; }.logic-flow { grid-template-columns: 1fr 1fr; }.logic-flow i { display: none; }
}

@media (max-width: 720px) {
  main { width: min(100% - 24px, 1460px); padding-top: 18px; }.topbar, .section-intro, .diagnostic-heading, .diagnostic-chart-heading, .target-action-bar, .workflow-actions { align-items: stretch; flex-direction: column; }.proposal-filebar { grid-template-columns: 1fr; }.proposal-file-actions { justify-content: flex-start; }.proposal-filebar > small { grid-column: auto; }.header-actions, .target-action-buttons { align-items: stretch; flex-direction: column; }.input-mode-setting, .future-basis-setting { align-items: stretch; flex-direction: column; }.mode-switch button { flex: 1; }.summary-grid, .two-column, .driver-grid, .metric-list, .formula-list, .logic-flow, .diagnostic-chart-grid { grid-template-columns: 1fr; }.hero-card, .metric-overview, .validation-panel { grid-column: span 1; }.hero-card { align-items: flex-start; gap: 20px; }.metric-row { grid-template-columns: 10px 1fr auto; }.metric-target { display: none; }.section-intro h2 { font-size: 26px; }.trend-chart-card { padding: 14px 10px 10px; }
}
